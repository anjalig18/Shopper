version: '3.8'

services:
  # MongoDB service (for local development)
  mongodb:
    image: mongo:7.0
    container_name: shophub-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: shophub
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - shophub-network

  # Backend service
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shophub-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/shophub?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - shophub-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local

networks:
  shophub-network:
    driver: bridge
